<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - AssetFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#00629D',
                        'on-primary': '#FFFFFF',
                        'primary-container': '#CFE5FF',
                        'on-primary-container': '#001D34',
                        secondary: '#51606F',
                        'on-secondary': '#FFFFFF',
                        'secondary-container': '#D5E4F6',
                        'on-secondary-container': '#0E1D2A',
                        tertiary: '#695779',
                        'on-tertiary': '#FFFFFF',
                        'tertiary-container': '#F0DBFF',
                        'on-tertiary-container': '#231532',
                        error: '#BA1A1A',
                        'on-error': '#FFFFFF',
                        'error-container': '#FFDAD6',
                        'on-error-container': '#410002',
                        background: '#FDFBFF',
                        'on-background': '#1A1C1E',
                        surface: '#FDFBFF',
                        'on-surface': '#1A1C1E',
                        'surface-variant': '#DFE2E6',
                        'on-surface-variant': '#42474E',
                        outline: '#73777F',
                        'outline-variant': '#C3C7CF',
                        'surface-container-lowest': '#FFFFFF',
                        'surface-container-low': '#F7F9FC',
                        'surface-container': '#F1F4F8',
                        'surface-container-high': '#EBEEF2',
                        'surface-container-highest': '#E5E8EC',
                    },
                    fontFamily: {
                        'title': ['"Outfit"', 'sans-serif'],
                        'body': ['"Plus Jakarta Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background font-body h-screen flex overflow-hidden">
    <!-- Left Side: Branding / Visuals -->
    <div class="hidden lg:flex w-1/2 bg-primary relative flex-col justify-between overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-br from-primary/90 to-[#001D34]/90 z-10 mix-blend-multiply"></div>
        <div class="absolute -top-24 -left-24 w-96 h-96 bg-primary-container rounded-full mix-blend-overlay opacity-20 blur-3xl animate-pulse"></div>
        <div class="absolute top-1/2 right-12 w-72 h-72 bg-tertiary-container rounded-full mix-blend-overlay opacity-20 blur-3xl" style="animation: pulse 4s infinite 1s;"></div>
        
        <div class="relative z-20 p-12">
            <div class="flex items-center gap-3 mb-12">
                <span class="material-symbols-outlined text-4xl text-on-primary" style="font-variation-settings: 'FILL' 1;">inventory_2</span>
                <span class="font-title text-3xl font-bold text-on-primary tracking-tight">AssetFlow</span>
            </div>
            <h1 class="font-title text-5xl font-semibold text-on-primary leading-tight mb-6 max-w-lg">
                Recover your account access.
            </h1>
            <p class="font-body text-primary-container text-lg max-w-md leading-relaxed">
                Enter your email address and we'll send you a link to securely reset your password.
            </p>
        </div>
        
        <div class="relative z-20 p-12 mt-auto">
            <div class="flex items-center gap-4 text-on-primary/80">
                <span class="material-symbols-outlined">security</span>
                <p class="font-body text-sm">Enterprise-grade security • AES-256 Encryption</p>
            </div>
        </div>
    </div>

    <!-- Right Side: Forms -->
    <div class="w-full lg:w-1/2 h-full flex flex-col justify-center items-center bg-surface px-6 sm:px-12 relative overflow-y-auto">
        <div class="w-full max-w-md bg-surface-container-lowest border border-outline-variant rounded-xl p-8 relative">
            <div class="mb-6 text-center">
                <span class="material-symbols-outlined text-primary text-5xl mb-2">lock_reset</span>
                <h2 class="font-title text-2xl font-semibold text-on-surface mb-1">Forgot Password?</h2>
                <p class="font-body text-sm text-on-surface-variant">Don't worry, we'll help you get back in.</p>
                <div id="reset-message" class="hidden mt-4 p-3 bg-primary-container text-on-primary-container text-sm rounded text-left"></div>
                <div id="reset-error" class="hidden mt-4 p-3 bg-error-container text-on-error-container text-sm rounded text-left"></div>
            </div>

            <form class="space-y-4" id="forgot-form">
                <div>
                    <label class="block font-title text-sm font-medium text-on-surface mb-1" for="reset-email">Corporate Email</label>
                    <input class="w-full h-10 px-3 bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-secondary focus:border-secondary transition-shadow text-body" id="reset-email" placeholder="name@company.com" type="email" required/>
                </div>

                <button id="reset-btn" class="w-full h-10 mt-6 bg-primary text-on-primary font-title text-sm font-medium rounded-lg hover:bg-[#004A77] transition-colors flex justify-center items-center gap-2" type="submit">
                    <span>Send Reset Link</span>
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="login.html" class="font-body text-sm text-secondary hover:text-primary transition-colors flex items-center justify-center gap-1">
                    <span class="material-symbols-outlined text-[16px]">arrow_back</span>
                    Back to Login
                </a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('forgot-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('reset-email').value;
            const messageDiv = document.getElementById('reset-message');
            const errorDiv = document.getElementById('reset-error');
            const btn = document.getElementById('reset-btn');
            
            messageDiv.classList.add('hidden');
            errorDiv.classList.add('hidden');
            
            if(!email) {
                errorDiv.textContent = 'Please enter your email address.';
                errorDiv.classList.remove('hidden');
                return;
            }

            const originalText = btn.innerHTML;
            btn.innerHTML = 'Sending...';
            btn.disabled = true;

            const basePath = '/Enterprise%20Asset%20&%20Resource%20Management%20System/backend/index.php';

            fetch(basePath + '/api/auth/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    messageDiv.textContent = data.data.message;
                    messageDiv.classList.remove('hidden');
                    document.getElementById('forgot-form').reset();
                } else {
                    errorDiv.textContent = data.error || 'An error occurred.';
                    errorDiv.classList.remove('hidden');
                }
            })
            .catch(err => {
                errorDiv.textContent = 'Network error. Please try again.';
                errorDiv.classList.remove('hidden');
            })
            .finally(() => {
                btn.innerHTML = originalText;
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
